server:
  port: 9012

spring:
  application:
    name: API-Gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Leave Service Routes
            - id: leave-service
              uri: lb://leave-service
              predicates:
                - Path=/leave/**
              filters:
                - Authentication

            # Auth Service Routes
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

eureka:
  client:
    service-url:
      defaultZone : http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE